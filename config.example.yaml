# WeChat-OpenCode Configuration
# Copy this file to config.yaml and modify as needed.
# All fields have defaults — this file is optional.

# Bot backend: "feishu" (Feishu) or "wechat" (WeChatFerry)
bot_type: "feishu"

# DeepSeek API Key (也可以用环境变量 DEEPSEEK_API_KEY 设置)
deepseek_api_key: "sk-..."

opencode:
  # Directory where opencode operates (your project root)
  project_dir: "C:\\Users\\<YOUR_USERNAME>"

  # Ports for the two opencode serve instances
  serve_port: 4097
  worker_serve_port: 4098

  # Host for opencode serve
  serve_host: "127.0.0.1"

  # Kill command execution after this many seconds
  command_timeout: 600

feishu:
  # Feishu bot credentials
  # Create an app at https://open.feishu.cn/app
  app_id: "cli_xxx"
  app_secret: "xxx"

service:
  # Seconds between heartbeat messages during execution
  heartbeat_interval: 30

  # Restart the service automatically on crash
  auto_restart: true

  # Logging level: DEBUG, INFO, WARN, ERROR
  log_level: "INFO"

  # Log file name (relative to project directory)
  log_file: "wechat_opencode.log"
